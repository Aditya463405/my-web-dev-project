<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="login-page-video.mp4" type="video/mp4">
    </video>

    <div class="container">
        <button class="cancel-button">X</button>
        <h1>Login</h1>

        <div class="box box1">
            <div class="box2">
            <label for="name">Username</label>
            <input type="text" id="name" name="user-namae" class="box22" required>
            </div>
        
            <div class="box2">
            <label for="pass">Password</label>
            <input type="password" id="pass" name="user-password" class="box22" required>
            </div>
        </div>

        <div class="box3">
            <div>
            <input type="checkbox" id="rem" name="remember-me">
            <label for="rem">Remember me</label>
            </div>

            <a href="" class="forgot-pass">Forgot password?</a>
        </div>

        <button class="login-button">Login</button>

        <p>Don't have an account? <a href="" class="register">Register</a></p>
    </div>
    
</body>
</html>
