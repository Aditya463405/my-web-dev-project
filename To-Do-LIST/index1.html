<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-LIST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Marcellus&family=Roboto+Slab:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div id="main">

        <h1>Welcome Back 👋</h1>
        <p class="subtitle">
        Sign in to continue managing your tasks
        </p>

        <form id="logoin-form">

            <div class="name">
                <label for="NAME">UserName :</label>
                <input type="text" id="NAME" name="user-name" value="" placeholder="Enter username" required>
            </div>

            <div class="name">
                <label for="PASS">Password :</label>
                <input type="password" id="PASS" name="user-password" value="" placeholder="Enter Password" required>
            </div>

            <button type="submit">🔐 Login</button>
        </form>

    </div>

    <script src="prac1.js"></script>

</body>
</html>
