<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="new.css">
</head>
<body>

    <header>
        <div id="web-app-name">📝 To - Do - list</div>
    </header>

    <main>
        <div id="second">
            <div class="user-name xyz"></div>
            <div class="date xyz"></div>
        </div>

        <div id="dashboard">
            <div class="display-result" id="total">
                <p>Total task</p>
                <div id="total-task">0</div>
            </div>
            <div class="display-result" id="pending">
                <p>Pending task</p>
                <div id="pending-task">0</div>
            </div>
            <div class="display-result" id="completed">
                <p>complete task</p>
                <div id="complete-task">0</div>
            </div>
        </div>

        <div class="tasks">
        <button id="add-task">+ Add Task</button>

        <div id="task-input"></div>
        
        </div>

        <div class="saved">
            <div class="saved-task">Saved Task</div>
            <div id="saved-items"></div>
        </div>

    </main>

    <script src="new.js"></script>
    
</body>
</html>
